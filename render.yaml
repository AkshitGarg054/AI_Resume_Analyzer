services:
  # ─── Backend (Docker + Puppeteer) ────────────────────────────────
  - type: web
    name: ai-resume-backend
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Backend/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      # fromService cannot reference a static site (no internal host).
      # Set FRONTEND_URL manually in the Render dashboard after the
      # frontend is deployed, e.g. https://ai-resume-frontend.onrender.com
      - key: FRONTEND_URL
        sync: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_GENAI_API_KEY
        sync: false

  # ─── Frontend (Vite / React Static Site) ─────────────────────────
  - type: web
    name: ai-resume-frontend
    runtime: static
    rootDir: Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # fromService with property: host works only for web/private services.
      # Use it here to pull the backend's internal hostname.
      - key: VITE_API_URL
        fromService:
          type: web
          name: ai-resume-backend
          property: host