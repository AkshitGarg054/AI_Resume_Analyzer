services:
  # ─── Backend (Docker + Puppeteer) ────────────────────────────────
  - type: web
    name: ai-resume-backend
    env: docker
    dockerContext: .
    dockerfilePath: ./Backend/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        fromService:
          type: web          # In the YAML, use 'web' even for static sites
          name: ai-resume-frontend
          property: url
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_GENAI_API_KEY
        sync: false

  # ─── Frontend (Vite / React Static Site) ─────────────────────────
  - type: web                
    name: ai-resume-frontend
    env: static              # This 'env' tells Render it's a Static Site
    rootDir: Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ai-resume-backend
          property: url